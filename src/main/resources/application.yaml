spring:
  application:
    name: booking_payment
  datasource:
    url: ${DB_URL:jdbc:mysql://multisuperapp1.cituis86a8r2.us-east-1.rds.amazonaws.com:3306/hyperlocal_platform}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:multisuperapp1}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    table: ${FLYWAY_TABLE:flyway_schema_history_booking_payment}
    url: ${FLYWAY_URL:${DB_URL:jdbc:mysql://multisuperapp1.cituis86a8r2.us-east-1.rds.amazonaws.com:3306/hyperlocal_platform}}
    user: ${FLYWAY_USER:${DB_USERNAME:admin}}
    password: ${FLYWAY_PASSWORD:${DB_PASSWORD:multisuperapp1}}

server:
  port: ${SERVER_PORT:8084}

app:
  security:
    access-token-secret: ${ACCESS_TOKEN_SECRET:auth-verification-service-super-secret-key}
    access-token-validity-seconds: ${ACCESS_TOKEN_VALIDITY_SECONDS:86400}
    refresh-token-validity-seconds: ${REFRESH_TOKEN_VALIDITY_SECONDS:2592000}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    payment-initiate-max-requests: ${RATE_LIMIT_PAYMENT_INITIATE_MAX_REQUESTS:12}
    payment-verify-max-requests: ${RATE_LIMIT_PAYMENT_VERIFY_MAX_REQUESTS:24}
    payment-failure-max-requests: ${RATE_LIMIT_PAYMENT_FAILURE_MAX_REQUESTS:24}
    payment-status-max-requests: ${RATE_LIMIT_PAYMENT_STATUS_MAX_REQUESTS:90}
    order-cancel-max-requests: ${RATE_LIMIT_ORDER_CANCEL_MAX_REQUESTS:12}
  firebase:
    enabled: ${FIREBASE_ENABLED:true}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:/opt/app/secrets/firebase.json}
  razorpay:
    enabled: ${RAZORPAY_ENABLED:false}
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
